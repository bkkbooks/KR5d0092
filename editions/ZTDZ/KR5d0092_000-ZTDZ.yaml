front:
  text: 上陽子金丹大要列仙誌夫四
  hash: sha256:58e4e1673d453cb111eb0b8cbb31c818a021e9fd43e52523b26bd25f94132224
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0092_SJB_000-240074b, image: sjb/24/240074b.png}
body:
  text: 紫宵絳言上陽子觀吾陳致虛撰東華帝君姓王不知其世代名號或云名玄甫得老子之道後隱崑崙山復居五臺山紫府洞天自稱少陽君於終南山凝陽洞以道授鍾離正陽六月十五日生十月十六日上昇正陽帝君姓鍾離名權字雲房號正陽子京兆咸陽人仕漢爲將軍因兵失利入終南山遇少陽君授以至道隱晋州羊角山道成天封號太極左宫真人乃束雙髽衣槲葉自稱天下都散漢有詩行世後於澧水以道授純陽四月十五日生五月十八日上昇純陽帝君姓吕名巖字洞賔號純陽子祖居西京河南府滿柘縣永樂鎮招賢里今曰蒲州坂縣生於天寳十四年乙未四月十四日巳時一云生唐德宗貞元丙子從父海州刺史因家焉以科舉授江州德化令因縱步廬山逰澧水之上遇正陽授道至今在世天帝頒詔爲九天採訪使五月二十日奉詔詩云糾司天上神仙籍之句世就以此日爲上昇有詩詞名渾成集行于世以道授海蟾重陽四月十四日生五月二十日上昇海蟾帝君姓劉名操字宗成號海蟾子又改名玄英燕山人仕遼登宰相因遇純陽即辭相印佯狂遠逰於秦州純陽授以丹道乃作詩云抛離火院三千口屏去門兵百萬家後道成遁跡於終南太華之間以金丹授董凝陽張紫陽十二月十四日生六月十五日上昇重陽帝君姓王名中孚字允卿又易名世雄字德威後入道改名嚞字知明號重陽子咸陽大魏村人也生宋徽宗政和二年壬辰十二月二十二日於終南縣甘河鎮遇純陽授口訣有詩四十八上始遭逢之句明年庚辰醴泉再遇復得金丹之道乃作穴居修行名活死人墓又與和玉蟾李靈陽結菴而坐初有史處厚劉通微嚴處常相繼受道後焚其菴東出關抵寧海州以金丹之道授與丹陽又授丘長春譚長真孫不二王玉陽劉長生郝太古乃以純陽所授秘訣五篇盡付七人有全眞前後集韜光集雲中集分梨十化說行于世十二月二十二日正月初四日上昇丹陽真君姓馬名鈺字玄寳號丹陽子先名從義字宜甫寧海州人生金太宗天會元年癸卯即宋徽宗宣和五年也五月二十日生家富號馬半州娶孫氏生三子曰庭珍庭瑞庭珪大定七年丁亥重陽至因食瓜從蔕起師怪而詢之重陽曰香從臭内岀甜向苦中來復叩云何名道重陽曰五行不到處父母未生前乃請歸家師之戊子歲以家事付三子而岀家重陽以所得純陽金丹秘訣五篇授之並口指其訣遂頂三髽而修行成道因分梨十化多受辛苦時求道者有李大乘趙蓬萊韓清甫等唯宋披雲得師金丹之㫖乃先成道有金玉集漸悟集行化集成道集圓成集精微集及語録一皆行于世七眞之内皆多帥也五月二十日生十二月二十二日上昇長真眞君姓譚名處端字通正號長真子寜海州人初名玉字伯玉生金太宗元年癸卯三月初一日中年患風痺師事重陽每旦重陽以盥餘令以洗面久而疾愈乃授以道以宿業重因遇醉徒敺擊折齒流血帥皆不問丹陽聞曰一拳消盡多生業道成有詩後句云湧岀陽神獨自歸書畢而逝異香滿室者數日有水雲集行於世三月初一日生四月初一日上昇長生真君姓劉名處玄字通妙號長生子東萊武官莊人生金熙宗皇統七年丁卯即宋高宗紹興十七年也七月十二日生大定九年即宋孝宗乾道五年師重陽道成於宋寧宗癸亥嘉泰三年二月初六鳴鼓集衆曲肱而逝有仙樂太虚盤陽同塵安閑修眞文集六及道德註隂符演黄庭述留世七月十二日生二月初六日上昇長春真君姓丘名處機字通宻號長春子登州棲霞縣濱都人生金熙宗皇統八年戊辰即宋高宗紹興十八年正月十九日生二十歲師重陽二十七歲乃入磻溪穴居修行三十三歲復居隴州龍門山苦行如磻溪時道成之後四十二歲赴金世宗召館六十二歲齊魯入于宋寧宗召師不赴六十五歲成吉思皇帝召見詳見慶會録對策禳灾救旱等事爲元朝功臣有磻溪鳴道文集二西逰記行于世丁亥歲七月初九日師升堂示衆以生死事留頌坐化正月十九日生七月初九日上昇玉陽真君姓王名處一字玉陽號傘陽子寜海東牟人生金皇統二年壬戌三月十八日師重陽受道居雲光洞志行確苦道成大著神異度人逐鬼踣盜碎石岀神入夢召雨撼峯烹雞降鶴起死嘘枯金世宗聞其名召對大副宸衷嫉者飲之鴆師歸入水水涸而不死有雲光集顯異録行于世三月十八日生四月二十二日上昇廣寧真君姓郝名大通字太古號廣寧子寧海人生金熙宗天眷三年庚申正月初三日巨富師事重陽初名璘號恬然子雖入道而志不苦勵長眞玉陽勸激之至岐山遇神人與金丹口訣爲改今名號遂逰趙魏間修行道成留頌而逝有太古集心經救苦經解大易圖及示教直言行世正月初三日生十二月三十日上昇清靜元君姓孫名不二號清靜散人寧海人也生宋徽宗宣和元年己亥正月初五日父孫忠顯俾適州之馬宜甫生三子重陽主以分梨十化宜甫夫婦仙姑出家學道居洛陽風仙洞修行夫婦每自相激勵俱成道有詩詞行世正月初五日生十二月二十九日上昇黄房公姓宋名有道字德方號黄房公沔陽府人氏行諸階法無雲則能以符而與雲有雲則能披雲而見斗故時號披雲真人一日遇丹陽授以金丹火候秘訣行之兩年能貳其身弗死因遊東海適皇元太祖成吉思皇帝召長春丘師叔時公與十八人爲之輔行之首世祖皇帝封通玄弘教披雲真人武宗皇帝加封玄通至道崇文明化大真人後以至道授太虚李眞人而黄房公莫知所終或云在燕之長春坐逝太虚真人姓李名珏字雙玉蜀之崇慶府人既得黄房公金丹之道改名栖真號太虚即往邵武之武夷潜修金丹七閲月而道將成乃回途道經龍虎先夕雩壇有夢真人至者時久旱祈禱弗應次日真人果至衆皆弗知唯夢者見一貧道人來曰是此人也衆請祈雨應時霶霈而去至真州玉虚菴結圜而坐後出圜以道授張紫瓊既囑曰金丹宜潜修大道當授人後云入青城莫知所終正月初十日生八月十五日成道紫瓊真人姓張名模字君範饒州德興人也後聞道改名道心初太虚真人偶寓安仁熙春宫紫瓊求授金丹太虚弗與繼而適市因見施丐錢三十文乃曰可授已遂以金丹之道付之次年復會眞州始全火候紫瓊既聞真要後以至道授于縁督趙公乃即隱去十月初二日生十二月二十五日成道縁督真人姓趙諱友欽字縁督饒郡人也爲趙宗子幼遭劫火蚤有山林之趣極聦敏天文經緯地理術數莫不精通及得紫瓊師授以金丹大道乃搜羣書經傳作三教一家之文名之曰仙佛同源又作金丹難問等書行於世己巳之秋寓衡陽以金丹妙道悉付上陽子六月十八日生上陽子金丹大要列仙誌
